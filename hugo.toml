baseURL = 'https://leslieo2.github.io/'
languageCode = 'en-us'
title = 'Leslie Liu'
theme = "ananke"

[params]
  author = "Leslie Liu"
  description = "Essays on agent systems, backend craft, and the friction between engineering and human narrative."
  body_classes = "theme-journal bg-near-white"
  background_color_class = "bg-transparent"
  # Set to the domain tracked in Plausible (e.g., "leslieo2.github.io")
  plausibleDomain = ""
  # If using Plausible's custom script snippet, set the script URL here (overrides plausibleDomain)
  plausibleCustomScriptURL = "https://plausible.io/js/pa-nSIvRlwPhPEF4w2fz0Go6.js"
  custom_css = ["homepage.css"]

  [params.hero]
    title = "Leslie Liu"
    primary_label = "Read the latest posts"
    primary_url = "/posts/"
    image = "/images/hero-portrait.png"
    secondary_label = "Visit GitHub"
    secondary_url = "https://github.com/leslieo2"

    [[params.hero.links]]
      label = "GitHub"
      url = "https://github.com/leslieo2"
      external = true

[menu]
  [[menu.main]]
    name = "Essays"
    url = "/posts/"
    weight = 10

  [[menu.main]]
    name = "GitHub"
    url = "https://github.com/leslieo2"
    weight = 20

  [[menu.main]]
    name = "About"
    url = "/"
    weight = 30

  [[menu.main]]
    name = "RSS"
    url = "/index.xml"
    weight = 40
