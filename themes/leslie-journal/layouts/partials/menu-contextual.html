{{- if .Params.toc -}}
  <div class="journal-context">
    <p class="journal-context__title">{{ lang.Translate "whatsInThis" . }}</p>
    {{ .TableOfContents }}
  </div>
{{- end -}}

{{ $related := .Site.RegularPages.Related . | collections.First 8 }}
{{ with $related }}
  <div class="journal-context">
    <p class="journal-context__title">{{ lang.Translate "related" }}</p>
    <ul>
      {{ range . }}
        <li><a href="{{ .RelPermalink }}">{{ .Title }}</a></li>
      {{ end }}
    </ul>
  </div>
{{ end }}
